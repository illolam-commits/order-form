<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skate Addict — Order Form</title>
<style>
  :root{
    --bg:#0f1115; --panel:#1a1d24; --bot:#232733; --user:#0a7c5a;
    --accent:#19c37d; --text:#eef0f4; --muted:#8b93a3; --danger:#e05555;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;}
  header{background:var(--panel);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a2e3a;flex-shrink:0;}
  .logo{width:42px;height:42px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;}
  header h1{font-size:16px;margin:0;}
  header p{font-size:12px;margin:0;color:var(--muted);}
  #chat{flex:1;overflow-y:auto;padding:16px 12px 8px;display:flex;flex-direction:column;gap:8px;}
  .msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word;animation:pop .18s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .bot{background:var(--bot);align-self:flex-start;border-bottom-left-radius:4px;}
  .user{background:var(--user);align-self:flex-end;border-bottom-right-radius:4px;}
  .summary{background:var(--bot);align-self:flex-start;border:1px solid #353b4a;width:90%;max-width:90%;font-size:14px;}
  .summary b{color:var(--accent);}
  #options{padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;flex-shrink:0;}
  .opt{background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:20px;padding:9px 16px;font-size:15px;cursor:pointer;font-weight:600;}
  .opt:active{background:var(--accent);color:#06291c;}
  .opt.warn{border-color:var(--danger);color:var(--danger);}
  #inputBar{display:none;padding:8px 12px 14px;gap:8px;flex-shrink:0;background:var(--panel);border-top:1px solid #2a2e3a;}
  #inputBar input{flex:1;background:#10131a;border:1px solid #353b4a;border-radius:22px;padding:11px 16px;color:var(--text);font-size:16px;outline:none;}
  #inputBar input:focus{border-color:var(--accent);}
  #sendBtn{background:var(--accent);border:none;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;color:#06291c;font-weight:bold;}
</style>
</head>
<body>
<header>
  <div class="logo">🛹</div>
  <div><h1>Skate Addict — Order Form</h1><p>Answer each question, confirm, then send via WhatsApp</p></div>
</header>
<div id="chat"></div>
<div id="options"></div>
<form id="inputBar"><input id="textInput" autocomplete="off" placeholder="Type here…"><button id="sendBtn" type="submit">➤</button></form>

<script>
const WHATSAPP_NUMBER = "14168002920"; // owner's WhatsApp (country code + number, digits only)
const MAX_ITEMS = 20;
const TYPES = ["Unisex T-shirt","Women T-shirt","Tank top","Sweatshirt","Hoodie"];
const SIZES = ["XS","S","M","L","XL","2XL"];
const FIELDS = [
  {key:"type",  label:"Clothing",       q:i=>`🧥 Item ${i+1}: What clothing would you like?`, options:TYPES},
  {key:"size",  label:"Size",           q:i=>`📏 What size?`, options:SIZES},
  {key:"color", label:"Color",          q:i=>`🎨 What clothing color? (type it in)`, input:true},
  {key:"front", label:"Front printing", q:i=>`🖨️ Front printing? (describe it, or tap None)`, input:true, none:true},
  {key:"back",  label:"Back printing",  q:i=>`🖨️ Back printing? (describe it, or tap None)`, input:true, none:true},
  {key:"note",  label:"Note",           q:i=>`📝 Any note for this item? (or tap None)`, input:true, none:true},
];

let items = [];        // each: {type,size,color,front,back,note}
let cur = null;        // item being filled
let fieldIdx = 0;
let mode = "new";      // "new" = full flow, "edit" = single field then summary
let editItem = -1;

const chat = document.getElementById("chat");
const optionsEl = document.getElementById("options");
const inputBar = document.getElementById("inputBar");
const textInput = document.getElementById("textInput");
let inputHandler = null;

function addMsg(text, cls){
  const d = document.createElement("div");
  d.className = "msg " + cls;
  if(cls==="summary"){ d.innerHTML = text; } else { d.textContent = text; }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function clearControls(){ optionsEl.innerHTML=""; inputBar.style.display="none"; inputHandler=null; }
function showOptions(list){
  clearControls();
  list.forEach(o=>{
    const b=document.createElement("button");
    b.className="opt"+(o.warn?" warn":"");
    b.textContent=o.label;
    b.onclick=()=>{ addMsg(o.label,"user"); clearControls(); o.fn(); };
    optionsEl.appendChild(b);
  });
}
function showInput(allowNone, fn){
  clearControls();
  if(allowNone){
    const b=document.createElement("button");
    b.className="opt"; b.textContent="None";
    b.onclick=()=>{ addMsg("None","user"); clearControls(); fn("—"); };
    optionsEl.appendChild(b);
  }
  inputBar.style.display="flex";
  inputHandler=fn;
  setTimeout(()=>textInput.focus(),100);
}
inputBar.addEventListener("submit",e=>{
  e.preventDefault();
  const v=textInput.value.trim();
  if(!v||!inputHandler) return;
  textInput.value="";
  addMsg(v,"user");
  const fn=inputHandler; clearControls(); fn(v);
});

function askField(idx){
  fieldIdx = idx;
  const f = FIELDS[idx];
  const itemNo = mode==="edit" ? editItem : items.length;
  addMsg(f.q(itemNo),"bot");
  if(f.options){
    showOptions(f.options.map(v=>({label:v, fn:()=>answer(v)})));
  } else {
    showInput(f.none, v=>answer(v));
  }
}
function answer(v){
  if(mode==="edit"){
    items[editItem][FIELDS[fieldIdx].key]=v;
    addMsg("✅ Updated!","bot");
    showSummary();
    return;
  }
  cur[FIELDS[fieldIdx].key]=v;
  if(fieldIdx+1<FIELDS.length){ askField(fieldIdx+1); }
  else{
    items.push(cur); cur=null;
    if(items.length>=MAX_ITEMS){
      addMsg(`That's ${MAX_ITEMS} items — the maximum for one order. Here's your list:`,"bot");
      showSummary();
    } else {
      addMsg(`👍 Item ${items.length} added. Any more items?`,"bot");
      showOptions([
        {label:"Yes, add another", fn:startItem},
        {label:"No, that's all", fn:showSummary},
      ]);
    }
  }
}
function startItem(){
  mode="new"; cur={};
  askField(0);
}
function summaryHTML(){
  let h=`<b>🛹 YOUR ORDER — ${items.length} item${items.length>1?"s":""}</b><br><br>`;
  items.forEach((it,i)=>{
    h+=`<b>Item ${i+1}: ${esc(it.type)}</b><br>`+
       `&nbsp;&nbsp;Size: ${esc(it.size)}<br>`+
       `&nbsp;&nbsp;Color: ${esc(it.color)}<br>`+
       `&nbsp;&nbsp;Front: ${esc(it.front)}<br>`+
       `&nbsp;&nbsp;Back: ${esc(it.back)}<br>`+
       `&nbsp;&nbsp;Note: ${esc(it.note)}<br><br>`;
  });
  return h;
}
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function showSummary(){
  if(items.length===0){
    addMsg("Your order is empty. Let's add an item!","bot");
    startItem(); return;
  }
  addMsg(summaryHTML(),"summary");
  addMsg("Is everything correct?","bot");
  const opts=[{label:"✅ Yes — send order", fn:sendOrder},
              {label:"✏️ No — fix something", fn:chooseItemToFix}];
  if(items.length<MAX_ITEMS) opts.push({label:"➕ Add another item", fn:startItem});
  showOptions(opts);
}
function chooseItemToFix(){
  addMsg("Which item do you want to change?","bot");
  const opts=items.map((it,i)=>({label:`Item ${i+1}: ${it.type} (${it.size})`, fn:()=>chooseField(i)}));
  opts.push({label:"↩️ Back to order", fn:showSummary});
  showOptions(opts);
}
function chooseField(i){
  editItem=i;
  addMsg(`What do you want to change on Item ${i+1}?`,"bot");
  const opts=FIELDS.map((f,fi)=>({label:f.label, fn:()=>{ mode="edit"; askField(fi); }}));
  opts.push({label:"🗑 Remove this item", warn:true, fn:()=>{
    items.splice(i,1);
    addMsg("Item removed.","bot");
    showSummary();
  }});
  opts.push({label:"↩️ Back", fn:showSummary});
  showOptions(opts);
}
function orderText(){
  const d=new Date();
  let t=`🛹 SKATE ADDICT — ORDER\nDate: ${d.toLocaleDateString()}\n`;
  items.forEach((it,i)=>{
    t+=`\nItem ${i+1}: ${it.type}\n• Size: ${it.size}\n• Color: ${it.color}\n• Front printing: ${it.front}\n• Back printing: ${it.back}\n• Note: ${it.note}\n`;
  });
  t+=`\nTotal items: ${items.length}\n✅ Confirmed by customer`;
  return t;
}
function sendOrder(){
  addMsg("🎉 Awesome! Opening WhatsApp — just tap Send to deliver your order. Thank you! 🛹","bot");
  const url=`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(orderText())}`;
  showOptions([{label:"📲 Open WhatsApp & send", fn:()=>{
    window.open(url,"_blank");
    addMsg("If WhatsApp didn't open, tap the button again.","bot");
    showOptions([
      {label:"📲 Open WhatsApp & send", fn:()=>window.open(url,"_blank")},
      {label:"✏️ Edit order", fn:showSummary},
      {label:"🔄 Start new order", fn:()=>{ items=[]; start(); }},
    ]);
  }}, {label:"✏️ Wait, edit order", fn:showSummary}]);
}
function start(){
  addMsg("👋 Hi! Welcome to the Skate Addict order form.\nI'll ask a few quick questions for each item you want (up to 20 items). Ready?","bot");
  showOptions([{label:"🛒 Start my order", fn:startItem}]);
}
start();
</script>
</body>
</html>
